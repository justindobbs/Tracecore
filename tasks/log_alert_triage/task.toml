id = "log_alert_triage"
suite = "operations"
version = 1
description = "Triage deterministic service logs and recover the final ALERT_CODE for escalation."
deterministic = true
seed_behavior = "fixed"

[budgets]
steps = 160
tool_calls = 45

[action_surface]
source = "actions.py"
schema = "introspected"

[validator]
entrypoint = "validate.py:validate"

[setup]
entrypoint = "setup.py:setup"

[sandbox]
filesystem_roots = ["/app"]
network_hosts = []
