id = "sandboxed_code_auditor"
suite = "operations"
version = 1
description = "Audit a sandbox runtime codebase, find the legacy bypass ISSUE_ID and analyzer AUDIT_CODE, and emit ISSUE_ID|AUDIT_CODE via SANDBOX_AUDIT_TOKEN."
deterministic = true
seed_behavior = "fixed"

[budgets]
steps = 100
tool_calls = 40

[action_surface]
source = "actions.py"
schema = "introspected"

[validator]
entrypoint = "validate.py:validate"

[setup]
entrypoint = "setup.py:setup"

[sandbox]
filesystem_roots = ["/app"]
network_hosts = []
