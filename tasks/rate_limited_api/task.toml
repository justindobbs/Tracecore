id = "rate_limited_api"
suite = "api"
version = 1
description = "Retrieve a protected ACCESS_TOKEN from a mock HTTP API that enforces a strict rate limit and emits transient failures."
deterministic = true
seed_behavior = "fixed"

[budgets]
steps = 120
tool_calls = 40

[action_surface]
source = "actions.py"
schema = "introspected"

[validator]
entrypoint = "validate.py:validate"

[setup]
entrypoint = "setup.py:setup"

[sandbox]
filesystem_roots = ["/app"]
network_hosts = []
