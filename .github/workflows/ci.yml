name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --tb=short -q

  smoke-test-install:
    name: Packaged install smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Install wheel into isolated venv
        run: |
          python -m venv .tmp-tracecore
          .tmp-tracecore/bin/pip install dist/tracecore-*.whl

      - name: Smoke test â€” bundled default agents present
        run: |
          .tmp-tracecore/bin/python - <<'PY'
          from pathlib import Path
          import agent_bench.agents as bundled_agents

          root = Path(bundled_agents.__file__).parent
          expected = {
              "toy_agent.py",
              "rate_limit_agent.py",
              "chain_agent.py",
              "ops_triage_agent.py",
              "log_stream_monitor_agent.py",
              "runbook_verifier_agent.py",
              "sandboxed_code_auditor_agent.py",
              "naive_llm_agent.py",
              "planner_agent.py",
              "cheater_agent.py",
              "dice_game_agent.py",
          }
          found = {p.name for p in root.glob("*.py") if p.name != "__init__.py"}
          missing = sorted(expected - found)
          if missing:
              raise SystemExit(f"Missing bundled agents: {missing}")
          PY

      - name: Smoke test — help (CLI import check)
        run: .tmp-tracecore/bin/agent-bench --help

      - name: Smoke test — list pairings
        run: .tmp-tracecore/bin/agent-bench run pairing --list

      - name: Smoke test — run pairing (bundled agent + task)
        run: .tmp-tracecore/bin/agent-bench run pairing filesystem_hidden_config --seed 1

      - name: Smoke test — list runs
        run: .tmp-tracecore/bin/agent-bench runs list --limit 1

      - name: Smoke test — dashboard help (import check)
        run: .tmp-tracecore/bin/agent-bench dashboard --help
