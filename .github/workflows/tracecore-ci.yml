name: TraceCore CI

on:
  push:
    branches: ["main", "v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check agent_bench

      - name: Run tests
        run: python -m pytest --tb=short -q

  spec-gate:
    name: Spec compliance gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run all pairings under strict-spec
        run: |
          tracecore run pairing --all --strict-spec
        continue-on-error: false

  diff-gate:
    name: Artifact diff gate (regression check)
    runs-on: ubuntu-latest
    needs: spec-gate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run baseline suite and export
        run: |
          tracecore run pairing --all
          tracecore baseline --export

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: baseline-artifacts-${{ github.sha }}
          path: .agent_bench/baselines/
          retention-days: 14
