[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "openclaw-bench"
version = "0.0.1"
description = "A lightweight benchmark for action-oriented agents."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "fastapi>=0.110",
    "uvicorn>=0.27",
]

[project.scripts]
openclaw-bench = "openclaw_bench.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = [
    "openclaw_bench",
]
